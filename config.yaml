task:
  type: multiclass
  labels: [0, 1, 2]
  target_col: "Class"

reproducibility:
  global_seed: 42
  checksum_algorithm: "sha256"

sequence:
  mode: time_windows
  T: 128
  stride: 32
  overlap: 0.75

data:
  expected_feature_count: 49
  drop_all_nan_rows: true
  null_tokens: ["", "NA", "N/A", "NaN", "nan", "null", "None", -999, -9999]
  labeled:
    format: xls
    path: data/MKA_TMI_labels.xls
    sheet_name: "Лист1"
  unlabeled:
    format: csv
    path: data/MKA_04.2015_unlabeled.csv
    sep: ","
    encoding: "utf-8"

split:
  method: time_order_windows
  random_state: 42
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

preprocessing:
  raw:
    impute_strategy: median
    scaling: none
  improved:
    impute_strategy: median
    scaler: robust
    clip_quantiles: [0.01, 0.99]

compute_budget:
  population_size: 12
  generations: 8
  max_epochs_fitness: 10
  max_epochs_final: 50
  target_macro_f1_gain_vs_baseline: 0.03

augmentation:
  enabled: true
  aug_factor: 3
  methods: ["noise", "scale"]
  noise_std: 0.01
  scale_min: 0.9
  scale_max: 1.1
  shift_min: -5
  shift_max: 5

training:
  early_stopping_patience: 5
  reduce_lr_patience: 3
  reduce_lr_factor: 0.5
  hybrid:
    n_conv_layers: 1
    conv_filters: 64
    conv_kernel_size: 5
    n_gru_layers: 1
    gru_units: 128
    n_dense_layers: 1
    dense_units: 128
    activation: "relu"
    optimizer: "adam"
    loss: "sparse_categorical_crossentropy"
    rnn_type: "gru"
    use_attention: false
    attention_units: 128
    batch_size: 8
    max_epochs: 30
    conv_dropout: 0.2
    dense_dropout: 0.3
    l2_dense: 0.0001
  autoencoder:
    batch_size: 8
    pretrain_max_epochs: 50
    pretrain_val_ratio: 0.15
    use_stage6_best_genome: true
